services:
  matteresp32hub:
    build: .
    image: matteresp32hub:latest
    restart: unless-stopped
    ports:
      - "48060:48060"
      - "48061:48061"
    volumes:
      - /Portainer/MatterESP32/db:/data/db
      - /Portainer/MatterESP32/firmware:/data/firmware
      - /Portainer/MatterESP32/modules:/data/modules
      - /Portainer/MatterESP32/templates:/data/templates
      - /Portainer/MatterESP32/config:/data/config
      - /Portainer/MatterESP32/logs:/data/logs
      - /Portainer/MatterESP32/certs:/data/certs
      - /Portainer/MatterESP32/matter:/data/matter
      - /dev:/dev  # exposes host /dev so plugged-in ttyUSB/ttyACM nodes are visible
    # Dynamic USB serial access — devices appear automatically when plugged in,
    # no container restart needed. cgroup rules grant access by device class:
    #   188 = ttyUSB (CH340, CP210x, FTDI…)
    #   166 = ttyACM (ESP32 native USB, Arduino…)
    device_cgroup_rules:
      - 'c 188:* rmw'
      - 'c 166:* rmw'
    environment:
      - DATA_DIR=/data
