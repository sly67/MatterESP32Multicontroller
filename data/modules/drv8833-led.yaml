id: drv8833-led
name: "DRV8833 Warm White LED Strip (A Channel)"
version: "1.2"
category: driver
io:
  - id: AIN1
    type: digital_pwm_out
    label: "Bridge A Input 1 → AOUT1 (A+) — Side 1"
    constraints:
      pwm: {frequency_hz: 25000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 11}
  - id: AIN2
    type: digital_pwm_out
    label: "Bridge A Input 2 → AOUT2 (A-) — Side 2"
    constraints:
      pwm: {frequency_hz: 25000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 11}
pin_groups:
  # Anti-parallel LEDs on one H-bridge — cwww platform blends the two sides;
  # DRV8833 handles simultaneous drive safely (brake mode = 0 V across strip).
  - {id: bridge_A, pins: [AIN1, AIN2], mode: complementary, dead_time_us: 1}
matter:
  endpoint_type: color_temperature_light
  behaviors: [on_off, level_control, color_temperature]
esphome:
  components:
    - domain: output
      template: |
        platform: ledc
        pin: "{AIN1}"
        id: {ID}_ain1
        frequency: 25000Hz
    - domain: output
      template: |
        platform: ledc
        pin: "{AIN2}"
        id: {ID}_ain2
        frequency: 25000Hz
    - domain: light
      template: |
        platform: cwww
        name: "{NAME}"
        warm_white: {ID}_ain1
        cold_white: {ID}_ain2
        warm_white_color_temperature: 2700K
        cold_white_color_temperature: 6500K
        gamma_correct: 1
        effects:
          - strobe:
          - pulse:
          - flicker:
