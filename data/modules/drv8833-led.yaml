id: drv8833-led
name: "DRV8833 Warm White LED Strip (A Channel)"
version: "1.1"
category: driver
io:
  - id: AIN1
    type: digital_pwm_out
    label: "Bridge A Input 1 → AOUT1 (A+) — positive LED drive"
    constraints:
      pwm: {frequency_hz: 25000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 11}
  - id: AIN2
    type: digital_pwm_out
    label: "Bridge A Input 2 → AOUT2 (A-) — negative LED drive"
    constraints:
      pwm: {frequency_hz: 25000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 11}
pin_groups:
  # Anti-parallel LEDs on one H-bridge — AIN1 and AIN2 must never be active simultaneously.
  # DRV8833 has ~100 ns internal dead time; software interlock via on_turn_on provides extra safety.
  - {id: bridge_A, pins: [AIN1, AIN2], mode: complementary, dead_time_us: 1}
matter:
  endpoint_type: dimmable_light
  behaviors: [on_off, level_control]
esphome:
  components:
    - domain: output
      template: |
        platform: ledc
        pin: "{AIN1}"
        id: {ID}_ain1
        frequency: 25000Hz
    - domain: output
      template: |
        platform: ledc
        pin: "{AIN2}"
        id: {ID}_ain2
        frequency: 25000Hz
    - domain: light
      template: |
        platform: monochromatic
        name: "{NAME} Side 1"
        id: {ID}_side1
        output: {ID}_ain1
        on_turn_on:
          then:
            - light.turn_off: {ID}_side2
        effects:
          - strobe:
          - pulse:
          - flicker:
    - domain: light
      template: |
        platform: monochromatic
        name: "{NAME} Side 2"
        id: {ID}_side2
        output: {ID}_ain2
        on_turn_on:
          then:
            - light.turn_off: {ID}_side1
        effects:
          - strobe:
          - pulse:
          - flicker:
