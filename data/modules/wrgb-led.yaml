id: wrgb-led
name: "WRGB LED Controller"
version: "1.0"
category: driver
io:
  - id: R
    type: digital_pwm_out
    label: "Red channel"
    constraints:
      pwm: {frequency_hz: 1000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 10}
  - id: G
    type: digital_pwm_out
    label: "Green channel"
    constraints:
      pwm: {frequency_hz: 1000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 10}
  - id: B
    type: digital_pwm_out
    label: "Blue channel"
    constraints:
      pwm: {frequency_hz: 1000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 10}
  - id: W
    type: digital_pwm_out
    label: "White channel"
    constraints:
      pwm: {frequency_hz: 1000, duty_min: 0.0, duty_max: 1.0, resolution_bits: 10}
matter:
  endpoint_type: extended_color_light
  behaviors: [color_control, brightness]
esphome:
  components:
    - domain: light
      template: "platform: rgbw\n  name: \"{NAME}\"\n  red:\n    platform: ledc\n    pin: \"{R}\"\n    id: led_r_{NAME}\n  green:\n    platform: ledc\n    pin: \"{G}\"\n    id: led_g_{NAME}\n  blue:\n    platform: ledc\n    pin: \"{B}\"\n    id: led_b_{NAME}\n  white:\n    platform: ledc\n    pin: \"{W}\"\n    id: led_w_{NAME}"
