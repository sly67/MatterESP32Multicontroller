id: drv8833-led-mono
name: "DRV8833 Mono LED Strip (A Channel, bipolar drive)"
version: "1.0"
category: driver
io:
  - id: AIN1
    type: digital_pwm_out
    label: "Bridge A Input 1 → AOUT1 (half A)"
    constraints:
      pwm: {frequency_hz: 15000, duty_min: 0.0, duty_max: 0.5, resolution_bits: 12}
  - id: AIN2
    type: digital_pwm_out
    label: "Bridge A Input 2 → AOUT2 (half B)"
    constraints:
      pwm: {frequency_hz: 15000, duty_min: 0.0, duty_max: 0.5, resolution_bits: 12}
  - id: LEDC_TIMER
    type: config
    label: "LEDC Timer index (0–3)"
    default: "1"
  - id: LEDC_CHAN_A
    type: config
    label: "LEDC Channel for AIN1 (0–5)"
    default: "2"
  - id: LEDC_CHAN_B
    type: config
    label: "LEDC Channel for AIN2 (0–5)"
    default: "3"
pin_groups:
  # Anti-parallel mono-color LEDs — bipolar drive alternates current direction
  # at high frequency so both physical halves light simultaneously.
  # DRV8833 hpoint-offset on channel B (half-period) prevents overlap; no dead time needed.
  - {id: bridge_A, pins: [AIN1, AIN2], mode: complementary}
matter:
  endpoint_type: dimmable_light
  behaviors: [on_off, level_control]
esphome:
  includes:
    - driver/ledc.h
  components:
    - domain: output
      template: |
        platform: template
        id: {ID}_mono_out
        type: float
        write_action:
          lambda: |-
            static bool drv_inited = false;
            if (!drv_inited) {
              drv_inited = true;
              const char *sa = "{AIN1}", *sb = "{AIN2}";
              int ga = sa[0]=='G' ? atoi(sa+4) : atoi(sa);
              int gb = sb[0]=='G' ? atoi(sb+4) : atoi(sb);
              ledc_timer_config_t tc = {};
              tc.speed_mode = LEDC_LOW_SPEED_MODE;
              tc.duty_resolution = (ledc_timer_bit_t)12;
              tc.timer_num = (ledc_timer_t){LEDC_TIMER};
              tc.freq_hz = 15000;
              tc.clk_cfg = LEDC_AUTO_CLK;
              ledc_timer_config(&tc);
              ledc_channel_config_t cc = {};
              cc.speed_mode = LEDC_LOW_SPEED_MODE;
              cc.timer_sel = (ledc_timer_t){LEDC_TIMER};
              cc.intr_type = LEDC_INTR_DISABLE;
              cc.duty = 0;
              cc.gpio_num = ga;
              cc.channel = (ledc_channel_t){LEDC_CHAN_A};
              cc.hpoint = 0;
              ledc_channel_config(&cc);
              cc.gpio_num = gb;
              cc.channel = (ledc_channel_t){LEDC_CHAN_B};
              cc.hpoint = 2048;
              ledc_channel_config(&cc);
            }
            float g = powf(state, 2.2f);
            uint32_t duty = (uint32_t)(g * 2048.0f);
            if (duty > 2048) duty = 2048;
            ledc_set_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_A}, duty);
            ledc_update_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_A});
            ledc_set_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_B}, duty);
            ledc_update_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_B});
    - domain: light
      template: |
        platform: monochromatic
        name: "{NAME}"
        output: {ID}_mono_out
        gamma_correct: 1.0
        effects:
          - strobe:
          - pulse:
          - flicker:
          - lambda:
              name: Dual Strobe
              update_interval: 10ms
              lambda: |-
                const int     FLASH_TICKS   = ({FLASH_MS}) / 10;
                const int     PAUSE_MIN_T   = ({PAUSE_MIN_MS}) / 10;
                const int     PAUSE_RANGE_T = (({PAUSE_MAX_MS}) - ({PAUSE_MIN_MS})) / 10;
                const int     SIDE_PARAM    = {SIDE};
                auto duty_of = [](float b) -> uint32_t {
                  if (b < 0.0f) b = 0.0f; if (b > 1.0f) b = 1.0f;
                  uint32_t d = (uint32_t)(powf(b, 2.2f) * 2048.0f);
                  return d > 2048u ? 2048u : d;
                };
                const uint32_t MIN_D = duty_of({MIN_PCT});
                const uint32_t MAX_D = duty_of({MAX_PCT});
                auto set_sides = [&](uint32_t da, uint32_t db) {
                  ledc_set_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_A}, da);
                  ledc_update_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_A});
                  ledc_set_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_B}, db);
                  ledc_update_duty(LEDC_LOW_SPEED_MODE, (ledc_channel_t){LEDC_CHAN_B});
                };
                static int8_t  phase      = 1;
                static int32_t ticks_left = 0;
                static uint8_t cur_side   = 2;
                static uint8_t alt_toggle = 0;
                if (--ticks_left > 0) {
                  if (phase == 0) {
                    uint32_t la = (cur_side == 0 || cur_side == 2) ? MAX_D : MIN_D;
                    uint32_t lb = (cur_side == 1 || cur_side == 2) ? MAX_D : MIN_D;
                    set_sides(la, lb);
                  } else {
                    set_sides(MIN_D, MIN_D);
                  }
                  return;
                }
                if (phase == 1) {
                  phase = 0;
                  ticks_left = FLASH_TICKS > 0 ? FLASH_TICKS : 1;
                  if      (SIDE_PARAM == 3) { cur_side = alt_toggle; alt_toggle ^= 1; }
                  else if (SIDE_PARAM == 4) { cur_side = (uint8_t)(rand() % 3); }
                  else                      { cur_side = (uint8_t)SIDE_PARAM; }
                  uint32_t la = (cur_side == 0 || cur_side == 2) ? MAX_D : MIN_D;
                  uint32_t lb = (cur_side == 1 || cur_side == 2) ? MAX_D : MIN_D;
                  set_sides(la, lb);
                } else {
                  phase = 1;
                  int range = PAUSE_RANGE_T > 0 ? PAUSE_RANGE_T : 1;
                  ticks_left = PAUSE_MIN_T + rand() % range;
                  if (ticks_left <= 0) ticks_left = 1;
                  set_sides(MIN_D, MIN_D);
                }
          - lambda:
              name: Twinkle
              update_interval: 50ms
              lambda: |-
                struct Spark {
                  uint8_t state, step, wait;
                  float peak;
                };
                static Spark sp[3] = {};
                static bool init = false;
                if (!init) {
                  init = true;
                  sp[0].wait = 3; sp[1].wait = 12; sp[2].wait = 22;
                }
                const uint8_t FADE_IN = 4, HOLD = 2, FADE_OUT = 18;
                float total = 0.0f;
                for (int i = 0; i < 3; i++) {
                  float b = 0.0f;
                  auto &s = sp[i];
                  switch (s.state) {
                    case 0:
                      if (++s.step >= s.wait) {
                        s.state = 1; s.step = 0;
                        s.peak = 0.2f + (rand() % 41) * 0.01f;
                        s.wait = 5 + rand() % 28;
                      }
                      break;
                    case 1:
                      b = s.peak * s.step / (float)FADE_IN;
                      if (++s.step > FADE_IN) { s.state = 2; s.step = 0; }
                      break;
                    case 2:
                      b = s.peak;
                      if (++s.step > HOLD) { s.state = 3; s.step = 0; }
                      break;
                    case 3:
                      b = s.peak * (1.0f - s.step / (float)FADE_OUT);
                      if (++s.step > FADE_OUT) { s.state = 0; s.step = 0; }
                      break;
                  }
                  total += b;
                }
                if (total > 1.0f) total = 1.0f;
                id({ID}_mono_out).set_level(total);
